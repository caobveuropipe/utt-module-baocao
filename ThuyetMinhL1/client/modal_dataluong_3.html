<script>
  /**CÁC HÀM PHỤ*/
  function modal_dataluong_3_Reset() {
    var trangThaiDuLieu = $('#modal_dataluong_2_trangthaidulieu').text();
    var trangThaiAction = $('#modal_dataluong_2_trangthaiaction').text();

    if (trangThaiDuLieu === "tính lương kỳ mới" || trangThaiAction === "Đang sửa") {
      Swal.fire({
        title: 'Chú ý!',
        text: 'Bảng tính lương này có dòng đang sửa chưa được lưu vào data. Bạn có tiếp tục đóng không?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Có',
        cancelButtonText: 'Không'
      }).then((result) => {
        if (result.isConfirmed) {
          modal_dataluong_3_resetTableAndFilters();
        }
      });
    } else {
      modal_dataluong_3_resetTableAndFilters();
    }
  }

  /**NHÓM HÀM TẠO GIAO DIỆN BAN ĐẦU*/
  //TẠO SELECT2
  $(document).ready(function () {
    $("#modal_dataluong_2_ChonThang, #modal_dataluong_2_Hoten_filter, #modal_dataluong_2_hopdong_filter, #modal_dataluong_2_donvi_filter").each(function () {
      $(this).select2({
        theme: "bootstrap-5",
        allowClear: true,
        width: 'style', // Dùng 'style' thay vì 'resolve' để giữ nguyên kích thước
        placeholder: $(this).attr("title"), // Đặt placeholder đúng
        //dropdownParent: $("#modal_dataluong_2_Modal"), // Fix lỗi hiển thị trong modal
      }).on("select2:clear", function () {
        // Thay vì đặt giá trị null, hãy đặt lại placeholder
        $(this).val("").trigger("change");
      });
    });
  });


  /**
   * CREATE THE DATA TABLE
   * */

  function modal_dataluong_3_resetTableAndFilters() {
    $('#modal_dataluong_2_trangthaiaction').text('');
    // Reset các bộ lọc ngoài bảng (dropdown filter)
    const externalFilters = [
      '#modal_dataluong_2_Hoten_filter',
      '#modal_dataluong_2_hopdong_filter',
      '#modal_dataluong_2_donvi_filter',
      '#modal_dataluong_2_SoNguoi',
      '#modal_dataluong_2_SoTien'

    ];

    externalFilters.forEach(function (selector) {
      if ($(selector).length) {
        $(selector).val('').trigger('change');
      }
    });

    // Thu gọn các bộ lọc (collapse)
    const filterCollapseButtons = [
      '#modal_dataluong_2_menu'
    ];

    filterCollapseButtons.forEach(function (selector) {
      if ($(selector).length) {
        // Nếu bộ lọc đang mở, ẩn nó đi
        $(selector).collapse('hide');
      }
    });

    var tableId = '#tableDataLuong1';
    var tableDivId = '#modal_dataluong_3_dataTableLuong1_div';

    // Kiểm tra bảng đã tồn tại và destroy nó
    if ($.fn.DataTable.isDataTable(tableId)) {
      // Destroy table
      $(tableId).DataTable().clear().destroy();
      // Xóa toàn bộ nội dung của div chứa bảng
      $(tableDivId).empty();
    }
  }

  async function modal_dataluong_3_tinhLuong() {
    document.getElementById('modal_dataluong_3_dataTableLuong1_div').innerHTML = "";

    if ($.fn.DataTable.isDataTable('#tableDataLuong1')) {
      $('#tableDataLuong1').DataTable().destroy();
    }

    // Bước 1: lấy tháng chọn
    let currentMonthStr = $('#modal_dataluong_2_ChonThang').val();
    if (!currentMonthStr) {
      digicoreToast('Vui lòng chọn tháng trước khi tính lương', 'warning')
      return;
    }

    $('#spinnerModal').modal('show');

    // Bước 2: kiểm tra tháng chọn nếu đã có tính lương thì gọi hàm lấy dữ liệu tính lương
    // Kiểm tra currentMonthStr trong cached
    const foundRow = pg_general_3_cacheDataStatusTinhLuong.find(row => row[0] === currentMonthStr);

    if (foundRow && foundRow[1] === 'Đã tạo thuyết minh') {
      $('#spinnerModal').modal('hide'); // tắt spinner trong khi chờ người dùng chọn

      const resultAsk = await Swal.fire({
        title: 'Bảng thuyết minh tháng ' + currentMonthStr + ' đã tồn tại',
        text: 'Bạn muốn xem lại hay tạo bảng mới?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        cancelButtonText: 'Tạo bảng mới',
        confirmButtonText: 'Xem lại',
        allowOutsideClick: false,
      });

      if (resultAsk.isConfirmed) {
        // Người dùng chọn Xem lại
        $('#spinnerModal').modal('show');
        google.script.run
          .withSuccessHandler(function (result) {
            //console.log("Data xem lại: ", result.dataLuongAnCa)
            //console.log("Status: ", result.status)
            if (result.status === "success") {

              pg_general_3_cacheDataLuongAnCa = result.dataLuongAnCa || [];
              // Gọi vẽ bảng lương ở đây, sau khi có dữ liệu
              modal_dataluong_3_TaoBangLuong(pg_general_3_cacheDataLuongAnCa);
              $('#spinnerModal').modal('hide');
            } else if (result.status === "no permission") {
              $('#spinnerModal').modal('hide');
              digicoreToast('Bạn không có quyền xem', 'error');
            } else {
              console.error("Lỗi từ server: ", result.message);
            }
          })
          .withFailureHandler(function (error) {
            console.error("Lỗi API:", error);
          })
          .modal_dataluong_1_getDataLuongAnCa(currentMonthStr, 'DataLuongAnCa');

        return;
      }
    }

    // Nếu CHƯA TÍNH LƯƠNG hoặc người dùng chọn TÍNH BỔ SUNG
    google.script.run
      .withSuccessHandler(function (result) {
        if (result.status === "success") {
          pg_general_3_cacheDataLuongAnCa = result.dataLuongAnCa || []; //result.dataLuongAnCa?.dataLuongAnCa || [];

          //Bước 6: Xóa các thiết lập bảng cũ trước khi tạo bảng mới
          modal_dataluong_3_Reset();

          // Gọi vẽ bảng lương ở đây, sau khi có dữ liệu
          modal_dataluong_3_TaoBangLuong(pg_general_3_cacheDataLuongAnCa);

          // Set trạng thái hành động thành "Đang sửa" để kích hoạt cảnh báo đóng tab
          $('#modal_dataluong_2_trangthaiaction').text('Đang sửa');

          $('#spinnerModal').modal('hide');

          // Hiển thị thông báo để tạo tương tác người dùng -> Kích hoạt beforeunload
          Swal.fire({
            title: 'Hoàn thành',
            text: 'Dữ liệu đã được tạo. Vui lòng kiểm tra và bấm LƯU lại trước khi rời đi.',
            icon: 'success',
            confirmButtonText: 'Đã hiểu'
          });

        } else if (result.status === "no permission") {
          $('#spinnerModal').modal('hide');
          digicoreToast('Bạn không có quyền xem', 'error');
        } else {
          console.error("Lỗi từ server: ", result.message);
        }
      })
      .withFailureHandler(function (error) {
        console.error("Lỗi API:", error);
      })
      .modal_dataluong_1_tinhLuongAnCa(currentMonthStr, 'TinhLuongAnCa');
  }

  //Đoạn code này dùng để tạo bảng và đưa dữ liệu từ data đã lọc theo phân quyền đưa lên bảng
  function modal_dataluong_3_TaoBangLuong(dataArray) {
    //console.log(dataArray)
    if (!dataArray || !Array.isArray(dataArray) || dataArray.length === 0) {
      console.error("Dữ liệu không hợp lệ!");
      return;
    }

    var headers = ['Trạng thái', 'ID', 'Mã CB', 'Họ và tên', 'Lương và truy lĩnh', 'Lương và truy lĩnh kỳ trước', 'Tăng', 'Giảm', 'Ghi chú', 'Phân loại'];
    var tableData = dataArray//.slice(1);

    var tableHtml = `<div'>
      <table class='table table-striped table-bordered' style='font-size:0.9em; width:100%;' id='tableDataLuong1'>
        <thead><tr>
          <th scope='col'>#</th>`;

    headers.forEach((header, colIndex) => {
      tableHtml += `<th scope='col' style="text-align: center; vertical-align: middle;">${header}</th>`;
    });

    tableHtml += `</tr></thead><tbody>`;

    tableData.forEach((row) => {
      tableHtml += `<tr>`;
      //Cột xóa
      tableHtml += `<td style="text-align: center">
                      <i class="fa fa-sharp fa-solid fa-trash btn btn-sm btn-light" 
                        style="font-size:15px;color:#adb5bd;" 
                        onclick="modal_dataluong_3_delRow(this)">
                      </i>
                    </td>`;

      // 1) Cột TRẠNG THÁI (sinh thêm, dựa vào ID = row[0])
      var idValue = row[0] ?? "";
      var statusText = (idValue === '' || idValue === null || idValue === undefined)
        ? 'Chưa lưu'
        : 'Đã lưu';
      tableHtml += `<td class="col-status" style="text-align:center; vertical-align:middle;">${statusText}</td>`;

      row.forEach((cellData, colIndex) => {
        var cellData = row[colIndex] ?? "";

        if (colIndex === 7) {
          // Cột Ghi chú - editable, căn trái, cho phép text & number
          tableHtml += `<td contenteditable="true" class="editable-note" style="text-align: left;" data-original="${cellData ?? ""}">${cellData ?? ""}</td>`;
        } else
          if (colIndex === 5 || colIndex === 6) { // Ăn ca, Còn lĩnh
            tableHtml += `<td style="text-align: right;">${cellData ?? 0}</td>`;
          } else {
            tableHtml += `<td>${cellData ?? ""}</td>`;
          }
      });

      tableHtml += `</tr>`;
    });

    tableHtml += `</tbody></table></div>`;

    $('#modal_dataluong_3_dataTableLuong1_div').html(tableHtml);

    // Hàm xóa dòng
    window.modal_dataluong_3_delRow = function (element) {
      const table = $('#tableDataLuong1').DataTable();
      const row = $(element).closest('tr');

      Swal.fire({
        title: 'Xác nhận xóa?',
        text: "Bạn không thể hoàn tác thao tác này!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Xóa',
        cancelButtonText: 'Hủy'
      }).then((result) => {
        if (result.isConfirmed) {
          table.row(row).remove().draw();
          document.getElementById('modal_dataluong_2_trangthaiaction').value = "Đang sửa"
          Swal.fire('Đã xóa!', 'Dòng đã được xóa khỏi bảng.', 'success');
        }
      });
    };

    // Cập nhật footer
    /*function updateFooterCount() {
      var soDong = 0;
      var columnIndexCheck = 5;  // Cột Họ tên
      var columnIndexSum = 9;   // Cột "Còn lĩnh"
      var tongSoTien = 0;

        if (cellText !== '') {

        var cellValue = $(this).find('td').eq(columnIndexSum).text().trim();
        if (cellValue) {

          var parsedValue = parseFloat(cellValue.replace(/,/g, '').replace(/\./g, ''));
          if (!isNaN(parsedValue)) {
            tongSoTien += parsedValue;
          }

      });

      $('#modal_dataluong_2_SoNguoi').val(soDong); // Hoặc đổi id nếu cần
      $('#modal_dataluong_2_SoTien').val(tongSoTien.toLocaleString('en-US'));
    }*/



    // Khởi tạo DataTable
    $('#tableDataLuong1').DataTable({
      destroy: true,
      responsive: false,
      stateSave: true,
      select: true,
      ordering: true,
      pageLength: 10,
      lengthMenu: [[10, 25, 50, 100, -1], ['10', '25', '50', '100', 'Tất cả']],
      dom: "<'row'<'col-6'l><'col-6'f>>" +
        "<'row'<'col-sm-12'tr>>" +
        "<'row'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
      language: {
        lengthMenu: "_MENU_ ",
        zeroRecords: "Không tìm thấy",
        info: "Hiển thị _START_ đến _END_ trong _TOTAL_ dòng",
        infoEmpty: "Không có dữ liệu",
        infoFiltered: "(lọc từ _MAX_ dòng)",
        search: '<i class="fas fa-search"></i>:',
        paginate: {
          first: "Đầu",
          previous: '<i class="fas fa-chevron-left"></i>',
          next: '<i class="fas fa-chevron-right"></i>',
          last: "Cuối"
        }
      },
      initComplete: function () {
        var table = this.api();

        const columnMappings = {
          0: '#modal_dataluong_2_Hoten_filter',
          3: '#modal_dataluong_2_hopdong_filter',
          9: '#modal_dataluong_2_donvi_filter'
        };

        Object.keys(columnMappings).forEach(function (columnIdx) {
          const column = table.column(parseInt(columnIdx) + 1); // +1 vì có thêm cột Xóa
          const select = $(columnMappings[columnIdx]);

          // Xóa các option cũ trước khi thêm mới
          select.empty();

          select.append('<option value="">Tất cả</option>');
          column.data().unique().sort().each(function (d) {
            select.append(`<option value="${d}">${d}</option>`);
          });

          select.on('change', function () {
            column.search(this.value).draw();
          });
        });
      },
      columnDefs: [

          targets: [5, 6, 7, 8],

            if (type === 'display' || type === 'filter') {

            }

          }

        { targets: 2, className: "tableDataLuong-col-id" },

    $('#tableDataLuong1')

    //Cập nhật hàm update khi có filter hoặc search
    $('#searchInput').on('input', function () {
      var value = $(this).val().toLowerCase();
      $('#tableDataLuong1 tbody tr').filter(function () {
        $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
      });
      //updateFooterCount(); // Gọi lại sau khi filter
    });
    $('#tableDataLuong1').on('draw.dt', function () {
      //updateFooterCount();
    });

    //Thêm sự kiện thay đổi cột truy lĩnh
    $('#tableDataLuong1 tbody').on('blur', 'td.editable-number', function () {
      var cell = $(this);
      var newValue = cell.text().trim().replace(/,/g, '');
      var isValidNumber = !isNaN(newValue) && newValue !== '';

      if (!isValidNumber) {
        Swal.fire('Lỗi!', 'Chỉ được nhập số.', 'error');
        cell.text('0');
        newValue = 0;
      }

      // Format lại số (dấu phẩy) và cập nhật vào ô
      var parsedValue = parseFloat(newValue) || 0;
      cell.text(parsedValue.toLocaleString('en-US'));

      // Tính: Còn lĩnh = Ăn ca + Truy lĩnh
      var row = cell.closest('tr');
      var valueAnCa = row.find('td').eq(9).text().trim().replace(/,/g, '');
      var valueTruyLinh = row.find('td').eq(10).text().trim().replace(/,/g, '');

      var valueConLinh = (parseFloat(valueAnCa) || 0) + (parseFloat(valueTruyLinh) || 0);
      row.find('td').eq(11).text(valueConLinh.toLocaleString('en-US'));

      // Cập nhật lại footer
      //updateFooterCount();
    });

    // Sự kiện thay đổi cột Ghi chú
    $('#tableDataLuong1 tbody').on('blur', 'td.editable-note', function () {
      var cell = $(this);
      var newValue = cell.text().trim();
      var originalValue = (cell.attr('data-original') || '').trim();

      // So sánh giá trị mới với giá trị ban đầu
      if (newValue !== originalValue) {
        // Cập nhật trạng thái thành "Chưa lưu"
        var row = cell.closest('tr');
        row.find('td.col-status').text('Chưa lưu');
        $('#modal_dataluong_2_trangthaiaction').text('Đang sửa');
      }
    });
  }


  function formatNumberCell(cell) {
    let value = cell.innerText.trim();

    // Xóa dấu phẩy và kiểm tra nếu là số
    let number = Number(value.replace(/,/g, ''));

    if (!isNaN(number)) {
      cell.innerText = number.toLocaleString('en-US');
    } else {
      // Nếu không phải số, xóa nội dung ô
      cell.innerText = '';
    }
  }


  function modal_dataluong_3_onEditStart() {
    $('#modal_dataluong_2_trangthaiaction').text("Đang sửa");

    // KHÔNG xử lý trong lúc gõ input nữa

    // Khi rời ô mới xử lý
    $(document).off('blur', '.table td[contenteditable="true"]').on('blur', '.table td[contenteditable="true"]', function () {
      var value = $(this).text().trim();

      // Xử lý: chỉ giữ số và 1 dấu chấm
      value = value.replace(/[^0-9.]/g, '');

      var parts = value.split('.');
      if (parts.length > 2) {
        value = parts[0] + '.' + parts.slice(1).join('');
      }

      var number = parseFloat(value);

      if (isNaN(number)) number = 0;

      // Format lại đẹp: 2 số lẻ
      $(this).text(number.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 6 }));
    });
  }

  /**LƯU tính lương*/
  //Steap 1: Lấy dữ liệu từ data table tableDataLuong1
  function modal_dataluong_3_getDataFromTable() {
    const table = $('#tableDataLuong1').DataTable();

    // 🔴 Sort theo cột "Đơn vị" (index 7 vì có cột # ở đầu) trước khi lưu
    table.order([7, 'asc']).draw();

    const rows = table.rows({ search: 'applied' }).nodes(); // ✅ lấy toàn bộ DOM dòng (không bị giới hạn bởi phân trang)

    const allData = [];

    $(rows).each(function () {
      const row = [];
      $(this).find('td').each(function (index) {
        // Bỏ cột (xóa, STT, ID), lấy từ 3 đến 11
        if (index >= 3 && index <= 11) {
          const text = $(this).text().replace(/,/g, '').trim();
          row.push(text);
        }
      });

      if (row.some(cell => cell !== "")) {
        allData.push(row);
      }
    });

    return allData;
  }

  //Step 2: ghi dữ liệu vào sheet
  async function modal_dataluong_3_luuTinhLuong() {
    $('#spinnerModal').modal('show');
    let currentMonthStr = $('#modal_dataluong_2_ChonThang').val();
    const targetMonthStr = currentMonthStr || pg_general_3_getTodayMonthStr();

    //A- Kiểm tra targetMonthStr trong cachedMonthData
    const foundRow = pg_general_3_cacheDataStatusTinhLuong.find(row => row[0] === targetMonthStr);

    if (foundRow && foundRow[1] === 'Đã tạo thuyết minh') {
      const result = await Swal.fire({
        title: 'Dữ liệu đã chốt',
        text: 'Dữ liệu cho tháng này Đã tạo thuyết minh. Bạn có muốn xóa dữ liệu cũ để ghi đè không?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Có, xóa và ghi đè',
        cancelButtonText: 'Không, hủy bỏ'
      });

      if (!result.isConfirmed) {

        return; // Dừng toàn bộ xử lý
      }

      // Nếu người dùng chọn Có, thực hiện xóa dữ liệu cũ
      try {
        await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(() => resolve())
            .withFailureHandler(error => {
              console.error('Lỗi khi xóa dữ liệu cũ:', error);
              digicoreToast('Lỗi khi xóa dữ liệu', 'error');
              reject(error);
            })
            .modal_dataluong_1_xoaDuLieu(targetMonthStr);
        });
      } catch (error) {
        return; // Dừng nếu xóa lỗi
      }
    }

    //B- Get dữ liệu trên table
    const allData = modal_dataluong_3_getDataFromTable();
    if (!allData || allData.length === 0) {
      digicoreToast("Không có dữ liệu để lưu", "warning");
      return;
    }

    let countSuccess = 0;
    let countFailure = 0;

    function checkCompletion() {
      if (countSuccess === 1) {
        digicoreToast("Dữ liệu đã được lưu thành công", "success");
      } else if (countFailure > 0) {
        digicoreToast("Lỗi khi lưu dữ liệu", "error");
      }
    }

    //C- Lưu dữ liệu allData vào file tính lương
    google.script.run
      .withSuccessHandler(function (result) {
        if (result.status === "success") {
          $('#spinnerModal').modal('hide');
          digicoreToast("Dữ liệu đã được lưu thành công", "success");

          // ✅ Cập nhật cột trạng thái thành "Đã lưu"
          $('#tableDataLuong1 tbody tr').each(function () {
            $(this).find('td.col-status').text('Đã lưu');
          });

          functionInit(false);
        } else if (result.status === "no permission") {
          $('#spinnerModal').modal('hide');
          digicoreToast('Bạn không có quyền lưu', 'error');
        } else {
          console.error("Lỗi từ server: ", result.message);
        }
      })
      .withFailureHandler(function (error) {

  /**TẠO BẢNG IN*/
  //Step 1: Lấy dữ liệu in từ data table tableDataLuong1
  function modal_dataluong_3_getPrintDataFromTable() {
    const table = $('#tableDataLuong1').DataTable();
    const rows = table.rows({ 'search': 'applied' }).nodes(); // Lấy tất cả DOM rows

    const skipCols = [0, 1, 2]; // 🛠️ Danh sách các cột cần bỏ qua hoàn toàn

    const allData = [];

    $(rows).each(function () {
      const rowData = [];
      $(this).find('td').each(function (index) {
        if (skipCols.includes(index)) return; // Bỏ qua cột không cần lấy

        let value;
        const input = $(this).find('input');
        if (input.length) {
          value = input.val().trim();
        } else {
          value = $(this).text().trim();
        }

        // ❌ Không remove dấu phẩy nữa
        rowData.push(value);
      });

      if (rowData.some(cell => cell !== "")) {
        allData.push(rowData);
      }
    });

    return allData;
  }

  /**IN BẢNG THUYẾT MINH LƯƠNG*/
  function modal_dataluong_3_luuPrintLuong() {
    let targetMonthStr = $('#modal_dataluong_2_ChonThang').val();

    // Kiểm tra xem đã chọn tháng chưa
    if (!targetMonthStr) {
      digicoreToast('Vui lòng chọn tháng trước khi in', 'warning');
      return;
    }

    // --- KIỂM TRA TRẠNG THÁI TÍNH LƯƠNG (LAZY LOADING CACHE) ---
    if (typeof pg_general_3_cacheDataStatusTinhLuong !== 'undefined' && pg_general_3_cacheDataStatusTinhLuong) {
      const foundStatus = pg_general_3_cacheDataStatusTinhLuong.find(row => row[0] === targetMonthStr);
      const status = foundStatus ? foundStatus[1] : '';

      if (status !== 'Đã tạo thuyết minh') {
        Swal.fire({
          title: 'Thông báo',
          text: 'Tháng ' + targetMonthStr + ' chưa được tạo thuyết minh. Vui lòng thực hiện tính lương và lưu lại trước khi in.',
          icon: 'warning',
          confirmButtonText: 'Đã hiểu'
        });
        return;
      }
    }


    // Convert kỳ lương: T01.2025 → tháng=1, năm=2025
    const [thangStr, namStr] = targetMonthStr.replace(/^T/, "").split(".");
    const vThang = parseInt(thangStr, 10);
    const vNam = namStr;

    // BƯỚC 1: Chọn Khu vực in (Mới)
    Swal.fire({
      title: 'Chọn Khu vực in',
      text: 'Bạn muốn in dữ liệu của khu vực nào?',
      icon: 'question',
      showDenyButton: true,
      showCancelButton: true,
      confirmButtonText: 'Hà Nội',
      denyButtonText: 'Phú Thọ',
      cancelButtonText: 'Tất cả',
      confirmButtonColor: '#3085d6',
      denyButtonColor: '#6e7881',
      cancelButtonColor: '#28a745',
      showCloseButton: true,
      allowOutsideClick: true,
    }).then((regionResult) => {
      let selectedRegion = "";
      if (regionResult.isConfirmed) {
        selectedRegion = "Hà Nội";
      } else if (regionResult.isDenied) {
        selectedRegion = "Phú Thọ";
      } else if (regionResult.dismiss === Swal.DismissReason.cancel) {
        selectedRegion = "Tất cả";
      } else {
        return; // Người dùng tắt popup bằng dấu X hoặc click ngoài
      }

      // BƯỚC 2: Chọn loại bảng in (Cập nhật pattern 3 nút giống L2)
      Swal.fire({
        title: 'Chọn loại bảng in',
        text: `Khu vực: ${selectedRegion}. Bạn muốn in phần nào?`,
        icon: 'question',
        showDenyButton: true,
        showCancelButton: true,
        confirmButtonText: 'Phần 1 - bảng đi ngân hàng',
        denyButtonText: 'Phần 2 - bảng thuyết minh',
        cancelButtonText: 'Hủy',
        confirmButtonColor: '#3085d6',
        denyButtonColor: '#d33',
        cancelButtonColor: '#6c757d',
        showCloseButton: true,
        allowOutsideClick: true,
      }).then((result) => {
        if (result.isConfirmed) {
          // ===== PHẦN 1: BẢNG ĐI NGÂN HÀNG =====
          $('#spinnerModal').modal('show');

          google.script.run
            .withSuccessHandler(function (response) {
              $('#spinnerModal').modal('hide');

              if (response.status === "success") {
                const rows = response.dataPrint;

                if (!rows || rows.length === 0) {
                  digicoreToast("Không có dữ liệu đi ngân hàng để in!", "warning");
                  return;
                }

                // Gọi function in cho phần 1
                openPrintWindow_diNganHang(rows, vThang, vNam);

              } else if (response.status === "no permission") {
                digicoreToast('Bạn không có quyền xem', 'error');
              } else {
                console.error("Lỗi từ server: ", response.message);
                digicoreToast("Lỗi khi lấy dữ liệu!", "error");
              }
            })
            .withFailureHandler(function (error) {
              $('#spinnerModal').modal('hide');
              console.error("Lỗi API:", error);
              digicoreToast("Lỗi kết nối server!", "error");
            })
            .modal_dataluong_1_getDataPrint(targetMonthStr, 'diNganHang_DataPrint', selectedRegion); // ✅ Truyền selectedRegion

        } else if (result.isDenied) {
          // ===== PHẦN 2: BẢNG THUYẾT MINH =====
          $('#spinnerModal').modal('show');

          google.script.run
            .withSuccessHandler(function (response) {
              $('#spinnerModal').modal('hide');

              if (response.status === "success") {
                const rows = response.dataPrint;

                if (!rows || rows.length === 0) {
                  digicoreToast("Không có dữ liệu thuyết minh để in!", "warning");
                  return;
                }

                // Gọi function in cho phần 2
                openPrintWindow_ThuyetMinh(rows, vThang, vNam, response.totalSums);

              } else if (response.status === "no permission") {
                digicoreToast('Bạn không có quyền xem', 'error');
              } else {
                console.error("Lỗi từ server: ", response.message);
                digicoreToast("Lỗi khi lấy dữ liệu!", "error");
              }
            })
            .withFailureHandler(function (error) {
              $('#spinnerModal').modal('hide');
              console.error("Lỗi API:", error);
              digicoreToast("Lỗi kết nối server!", "error");
            })
            .modal_dataluong_1_getDataPrint(targetMonthStr, 'coThayDoi_DataPrint', selectedRegion); // ✅ Truyền selectedRegion
        }
      });
    });
  }

  /**
   * MỞ CỬA SỔ IN: BẢNG ĐI NGÂN HÀNG
   * @param {Array<Array>} rows Dữ liệu lương từ server
   * @param {number} thangT Tháng hiện tại (T)
   * @param {string} nam Năm
   */
  function openPrintWindow_diNganHang(rows, thangT, nam) {
    // ✅1. CSS in ấn - tối ưu A4 — CẬP NHẬT: tăng độ ưu tiên cho .num
    const css = `
  <style>
    @page {
      size: A4 landscape;
      margin: 10mm 10mm 10mm 10mm;
    }

    body {
      font-family: "Times New Roman", Times, serif;
      font-size: 11px;
      color: #000;
      line-height: 1.1;
    }

    /* ✅ Thêm vào phần CSS */
    .header-section {
      position: relative;
      margin-bottom: 10px;
      padding-right: 120px; 
    }
    .header-title {
      font-weight: 700; font-size: 13px; text-align: left; margin-bottom: 4px;
    }

    table {
      width: 100%; border-collapse: collapse; margin-bottom: 5px; table-layout: fixed;
    }

    thead { display: table-header-group; }
    tbody { display: table-row-group; }

    th, td {
      border: 1px solid #000; 
      padding: 2px 3px; 
      vertical-align: middle; 
      text-align: center;
      word-wrap: normal;
      overflow: hidden;
    }

    th {
      font-weight: 700; 
      background-color: #f0f0f0;
      font-size: 10.5px;
    }

    .num {
      text-align: right !important;
      font-variant-numeric: tabular-nums;
      font-size: 10px;
      white-space: nowrap; /* Ngăn xuống dòng số */
    }

    /* Họ tên (cột thứ 2) */
    tbody tr:not(.total-row) td:nth-child(2) {
      text-align: left !important;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Số tài khoản (cột thứ 3) */
    tbody tr:not(.total-row) td:nth-child(3) {
      white-space: nowrap;
    }

    tr { page-break-inside: avoid; }

    .total-row td {
      font-weight: bold;
      background-color: #f9f9f9;
    }

    @media print {
      body { zoom: 1; }
      th, td { border: 0.5pt solid #000; }
      thead th {
        background-color: #f0f0f0 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
    

  </style>`;

    // ✅2. Tiêu đề - CẬP NHẬT THEO MẪU HÌNH
    const headerHtml = `
<div class="header-section">
  <div style="text-align: center; font-weight: bold; font-size: 14px; margin-bottom: 5px;">
    BẢNG THANH TOÁN CHO ĐỐI TƯỢNG THỤ HƯỞNG
  </div>
  <div style="text-align: center; font-size: 12px; margin-bottom: 10px;">
    (Kèm theo giấy rút dự toán/ ủy nhiệm chi số <span style="display: inline-block; width: 80px; border-bottom: 1px solid #000; text-align: center;">&nbsp;</span>)
    &nbsp;&nbsp;&nbsp;
    Ngày <span style="display: inline-block; width: 20px; border-bottom: 1px solid #000; text-align: center;">&nbsp;</span>
    &nbsp;&nbsp;&nbsp;
    Tháng <span style="display: inline-block; width: 20px; border-bottom: 1px solid #000; text-align: center;">&nbsp;</span>
    &nbsp;&nbsp;&nbsp;
    năm <span style="display: inline-block; width: 30px; border-bottom: 1px solid #000; text-align: center;">&nbsp;</span>
  </div>

  <div style="margin-bottom: 5px;">
    <span style="font-weight: bold;">1. Đơn vị sử dụng ngân sách</span>
    &nbsp;&nbsp;<span style="border-bottom: 1px solid #000; padding: 0 5px;">Phân hiệu Trường Đại học Công nghệ GTVT</span>
  </div>

  <div style="margin-bottom: 5px;">
    <span style="font-weight: bold;">2. Mã đơn vị</span>
    &nbsp;&nbsp;<span style="border-bottom: 1px solid #000; padding: 0 5px;">1055621</span>
  </div>

  <div style="margin-bottom: 10px;">
    <span style="font-weight: bold;">3. Tài khoản thanh toán của đơn vị mở tại ngân hàng thương mại</span>
    &nbsp;&nbsp;<span style="border-bottom: 1px solid #000; padding: 0 5px;">Ngân hàng SHB - chi nhánh Hà Nội</span>
  </div>

  <div style="border-top: 1px solid #000; padding-top: 5px; margin-bottom: 10px;">
    <span style="font-weight: bold;">I- Nội dung thanh toán</span>
    &nbsp;&nbsp;<span style="border-bottom: 1px solid #000; padding: 0 5px;">Thu nhập tháng ${thangT}/${nam}</span>
  </div>

  <!-- Thông tin bên phải (Mẫu số 09, Mã hiệu, Số) -->
  <div style="position: absolute; top: 10px; right: 20px; text-align: right; font-size: 12px;">
    <div><strong>Mẫu số 09</strong></div>
    <div>Mã hiệu: <span style="display: inline-block; width: 80px; border-bottom: 1px solid #000; text-align: center;">&nbsp;</span></div>
    <div>Số: <span style="display: inline-block; width: 80px; border-bottom: 1px solid #000; text-align: center;">&nbsp;</span></div>
  </div>
</div>`;


    // ✅3. Thead - CẬP NHẬT THEO MẪU HÌNH 1 & 2
    const theadHtml = `
  <thead>
    <tr>
      <th rowspan="2" style="width: 3%;">Số<br>TT</th>
      <th rowspan="2" style="width: 14%;">Họ và tên</th>
      <th colspan="2" style="width: 16%;">Tài khoản ngân hàng</th>
      <th rowspan="2" style="width: 8%;">Tổng số</th>
      <th rowspan="2" style="width: 8%;">Lương và PC theo lương</th>
      <th rowspan="2" style="width: 8%;">Tiền công LĐ TX (theo HĐ)</th>
      <th colspan="4" style="width: 24%;">Tiền phụ cấp và trợ cấp khác</th>
      <th rowspan="2" style="width: 6%;">Tiền khoán</th>
      <th rowspan="2" style="width: 6%;">Tiền học bổng</th>
      <th rowspan="2" style="width: 7%;">Ghi chú</th>
    </tr>
    <tr>
      <th style="width: 9%;">Số TK người được hưởng</th>
      <th style="width: 7%;">Tên ngân hàng</th>
      <th style="width: 6%;">Ngành</th>
      <th style="width: 6%;">Đ.hại</th>
      <th style="width: 6%;">T.Nhiệm</th>
      <th style="width: 6%;">Đ.Doàn</th>
    </tr>
    <!-- ✅ DÒNG HEADER ĐÁNH SỐ THEO MẪU HÌNH 2 -->
    <tr style="background-color: #f0f0f0; font-weight: bold; font-size: 10px;">
      <th>(1)</th>
      <th>(2)</th>
      <th colspan="2">(3)</th>
      <th>(4)</th>
      <th>(5)</th>
      <th>(6)</th>
      <th colspan="4">(9)</th>
      <th>(10)</th>
      <th>(11)</th>
      <th>(12)</th>
    </tr>
  </thead>`;

    // ✅4. Xử lý dữ liệu
    let sums = {
      col4: 0, col5: 0, col6: 0, col7: 0, col8: 0, col9: 0, col10: 0, col11: 0, col12: 0
    };

    let sttCounter = 1; // Khởi tạo biến đếm STT riêng

    const formatNum = (val) => {
      if (val == null || val === '' || val === 0) return '';
      // Nếu là số, dùng trực tiếp. Nếu là chuỗi, mới cần làm sạch.
      const num = typeof val === 'number' ? val : parseFloat(String(val).replace(/[,]/g, '')) || 0;
      if (num === 0) return '';
      return num.toLocaleString('de-DE');
    };

    const tbodyHtml = rows.map((r, idx) => {
      const hoTen = (r[1] || '').trim();
      const isTotalRow = /^[Tt]ổng/i.test(hoTen);

      const stt = isTotalRow ? '' : (sttCounter++); // Chỉ tăng STT cho dòng thường
      const rawSoTaiKhoan = r[2] || '';
      const soTaiKhoan = String(rawSoTaiKhoan).replace(/^'/, '');
      const tenNganHang = r[3] || '';

      // Map các cột tiền từ index 4 -> 12
      const vals = [];
      for (let i = 4; i <= 12; i++) {
        const rawV = r[i];
        const v = typeof rawV === 'number' ? rawV : (parseFloat(String(rawV || 0).replace(/[,]/g, '')) || 0);
        vals[i] = v;
        if (!isTotalRow) {
          sums['col' + i] += v;
        }
      }

      const rowStyle = isTotalRow ? 'style="font-weight: bold; background-color: #fafafa;"' : '';
      const nameAlign = isTotalRow ? 'text-align: center;' : 'text-align: left;';

      return `
      <tr ${rowStyle}>
        <td>${stt}</td>
        <td style="${nameAlign}">${hoTen}</td>
        <td>${soTaiKhoan}</td>
        <td>${tenNganHang}</td>
        <td class="num">${formatNum(isTotalRow ? r[4] : vals[4])}</td>
        <td class="num">${formatNum(isTotalRow ? r[5] : vals[5])}</td>
        <td class="num">${formatNum(isTotalRow ? r[6] : vals[6])}</td>
        <td class="num">${formatNum(isTotalRow ? r[7] : vals[7])}</td>
        <td class="num">${formatNum(isTotalRow ? r[8] : vals[8])}</td>
        <td class="num">${formatNum(isTotalRow ? r[9] : vals[9])}</td>
        <td class="num">${formatNum(isTotalRow ? r[10] : vals[10])}</td>
        <td class="num">${formatNum(isTotalRow ? r[11] : vals[11])}</td>
        <td class="num">${formatNum(isTotalRow ? r[12] : vals[12])}</td>
        <td style="text-align: left;">${r[13] || ''}</td>
      </tr>`;
    }).join('');

    // ✅ Dòng tổng cộng cuối cùng (chỉ thêm nếu server chưa trả về dòng "TỔNG CỘNG")
    const hasFinalTotal = rows.some(r => (r[1] || '').trim().toUpperCase() === 'TỔNG CỘNG');
    const finalTotalRow = !hasFinalTotal ? `
    <tr class="total-row" style="font-weight: bold; background-color: #f0f0f0;">
      <td colspan="4" style="text-align: center;">TỔNG CỘNG</td>
      <td class="num">${formatNum(sums.col4)}</td>
      <td class="num">${formatNum(sums.col5)}</td>
      <td class="num">${formatNum(sums.col6)}</td>
      <td class="num">${formatNum(sums.col7)}</td>
      <td class="num">${formatNum(sums.col8)}</td>
      <td class="num">${formatNum(sums.col9)}</td>
      <td class="num">${formatNum(sums.col10)}</td>
      <td class="num">${formatNum(sums.col11)}</td>
      <td class="num">${formatNum(sums.col12)}</td>
      <td></td>
    </tr>
  ` : '';

    const tableHtml = `
  <table>
    ${theadHtml}
    <tbody>
      ${tbodyHtml}
      ${finalTotalRow}
    </tbody>
  </table>`;

    // ✅ Thêm dòng số tiền bằng chữ
    const tongSoTien = hasFinalTotal ? (parseFloat(String(rows.find(r => (r[1] || '').trim().toUpperCase() === 'TỔNG CỘNG')[4] || 0).replace(/[,.]/g, '')) || 0) : sums.col4;
    const soTienBangChu = docSoThanhChu(tongSoTien);
    const amountInWordsHtml = `
    <div style="margin-top: 10px; font-style: italic; font-size: 12px;">
      <span style="font-weight: bold;">Số tiền bằng chữ:</span> ${soTienBangChu}
    </div>`;

    // ✅ HTML hoàn chỉnh
    const html = `
  <!DOCTYPE html>
  <html>
  <head>
    <meta charset="utf-8">
    <title>Bảng chuyển lương - Tháng ${thangT}/${nam}</title>
    ${css}
  </head>
  <body>
    ${headerHtml}
    ${tableHtml}
    ${amountInWordsHtml}
  </body>
  </html>`;

    /** HÀM ĐỌC SỐ THÀNH CHỮ */
    function docSoThanhChu(so) {
      if (so === 0) return 'Không đồng';
      const ChuSo = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
      const Tien = ["", "nghìn", "triệu", "tỷ", "nghìn tỷ", "triệu tỷ"];

      function docBlock(n) {
        let tram = Math.floor(n / 100);
        let chuc = Math.floor((n % 100) / 10);
        let donvi = n % 10;
        let ketqua = "";
        if (tram > 0) ketqua += ChuSo[tram] + " trăm ";
        if (chuc > 1) {
          ketqua += ChuSo[chuc] + " mươi ";
          if (donvi === 1) ketqua += "mốt ";
          else if (donvi === 5) ketqua += "lăm ";
          else if (donvi > 0) ketqua += ChuSo[donvi] + " ";
        } else if (chuc === 1) {
          ketqua += "mười ";
          if (donvi === 5) ketqua += "lăm ";
          else if (donvi > 0) ketqua += ChuSo[donvi] + " ";
        } else if (tram > 0 && donvi > 0) {
          ketqua += "lẻ " + ChuSo[donvi] + " ";
        } else if (donvi > 0) {
          ketqua += ChuSo[donvi] + " ";
        }
        return ketqua;
      }

      let result = "";
      let blocks = [];
      let tempSo = Math.abs(Math.round(so));
      while (tempSo > 0) {
        blocks.push(tempSo % 1000);
        tempSo = Math.floor(tempSo / 1000);
      }

      for (let i = blocks.length - 1; i >= 0; i--) {
        let blockText = docBlock(blocks[i]);
        if (blockText !== "") {
          result += blockText + Tien[i] + " ";
        }
      }

      result = result.trim();
      if (result === "") return "Không đồng";
      return result.charAt(0).toUpperCase() + result.slice(1) + " đồng.";
    }

    // ✅ In
    const printWin = window.open("", "_blank");
    if (!printWin) {
      alert("Trình duyệt đang chặn popup. Hãy cho phép popup để in.");
      return;
    }
    printWin.document.open();
    printWin.document.write(html);
    printWin.document.close();

    printWin.onload = () => setTimeout(() => printWin.print(), 100);
  }
</script>

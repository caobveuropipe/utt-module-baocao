<div class="modal fade" id="spinnerModal" data-bs-backdrop="static" data-bs-keyboard="false" role="dialog" aria-labelledby="spinnerModalLabel">
	<div class="modal-dialog modal-dialog-centered" role="document">
		<div class="modal-content" style="border-radius: 12px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
			<div class="modal-body text-center p-4">
				<div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
					<span class="visually-hidden">Loading...</span>
				</div>
				<p class="mt-3 mb-4 fw-bold text-secondary" id="spinnerModalMessage">Đang xử lý dữ liệu...</p>
				<button type="button" class="btn btn-outline-danger btn-sm px-4" id="btnCancelSpinnerAction" style="display: none; border-radius: 20px;">
					<i class="fas fa-times me-1"></i> Hủy hành động
				</button>
			</div>
		</div>
	</div>
</div>

<style>
  /* CSS Variables for Color Palette */
  :root {
    --primary-50: #f0fdf9;
    --primary-100: #ccfbf1;
    --primary-200: #99f6e4;
    --primary-300: #5eead4;
    --primary-400: #2dd4bf;
    --primary-500: #14b8a6;
    --primary-600: #0d9488;
    --primary-700: #0f766e;
    --primary-800: #115e59;
    --primary-900: #134e4a;

    --slate-50: #f8fafc;
    --slate-100: #f1f5f9;
    --slate-200: #e2e8f0;
    --slate-400: #94a3b8;
    --slate-500: #64748b;
    --slate-700: #334155;
    --slate-800: #1e293b;
    --slate-900: #0f172a;

    --emerald-500: #10b981;
    --emerald-600: #059669;
    --blue-500: #3b82f6;
    --blue-600: #2563eb;
    --rose-500: #f43f5e;
    --rose-600: #e11d48;
    --amber-500: #f59e0b;
    --amber-600: #d97706;
    --violet-500: #8b5cf6;
    --violet-600: #7c3aed;
  }

  /* Global Styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background-color: var(--slate-50);
    color: var(--slate-800);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Header Styles */
  .header {
    background-color: white;
    border-bottom: 1px solid var(--slate-200);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-container {
    max-width: 80rem;
    margin: 0 auto;
    padding: 0 1rem;
    height: 4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .header-icon-box {
    background-color: var(--primary-50);
    padding: 0.5rem;
    border-radius: 0.5rem;
  }

  .header-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--slate-800);
    letter-spacing: -0.025em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .header-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--slate-500);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.2s;
  }

  .header-btn:hover {
    color: var(--primary-600);
  }

  .header-divider {
    height: 1.5rem;
    width: 1px;
    background-color: var(--slate-200);
  }

  .header-info-btn {
    padding: 0.5rem;
    color: var(--slate-400);
    background: none;
    border: none;
    border-radius: 9999px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .header-info-btn:hover {
    color: var(--primary-600);
    background-color: var(--primary-50);
  }

  /* Main Content */
  main {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 1.5rem 1rem 3rem;
    /* Reduced padding */
  }

  .content-container {
    width: 100%;
    max-width: 72rem;
  }

  /* Title Section */
  .title-section {
    text-align: center;
    margin-bottom: 1.5rem;
    /* Reduced margin */
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.25rem 0.75rem;
    border-radius: 9999px;
    background-color: var(--primary-100);
    color: var(--primary-700);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .main-title {
    font-size: 2.25rem;
    font-weight: 800;
    color: var(--slate-900);
    letter-spacing: -0.025em;
    margin-bottom: 1rem;
  }

  .main-title .highlight {
    color: var(--primary-600);
    cursor: pointer;
    transition: color 0.2s;
    display: inline-flex;
    align-items: center;
    vertical-align: top;
  }

  .main-title .highlight:hover {
    color: var(--primary-700);
  }

  .subtitle {
    font-size: 1.125rem;
    color: var(--slate-500);
    max-width: 42rem;
    margin: 0 auto;
  }

  /* Month Selector */
  .month-selector-container {
    width: 100%;
    max-width: 20rem;
    margin: 0 auto 1.5rem;
    display: flex;
    justify-content: center;
  }

  .select-wrapper {
    position: relative;
  }

  .select-icon-left {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--slate-400);
  }

  .select-icon-right {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--slate-400);
  }

  .month-select {
    appearance: none;
    width: 100%;
    padding: 0.75rem 2.5rem;
    font-size: 1rem;
    border: 1px solid var(--slate-200);
    border-radius: 0.75rem;
    background-color: white;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    color: var(--slate-700);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  }

  .month-select:hover {
    border-color: var(--primary-300);
  }

  .month-select:focus {
    outline: none;
    border-color: var(--primary-500);
    box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
  }

  /* Module Cards Grid - Updated to 5 columns */
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.25rem;
    margin-bottom: 2rem;
    /* Reduced bottom margin */
  }

  @media (min-width: 768px) {
    .modules-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (min-width: 1200px) {
    .modules-grid {
      grid-template-columns: repeat(5, 1fr);
      gap: 1.5rem;
    }
  }

  /* Module Card - Modern Compact Style */
  .module-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: white;
    border-radius: 1rem;
    padding: 1.5rem 1rem;
    border: 1px solid var(--slate-200);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    text-align: center;
    min-height: 160px;
  }

  .module-card:hover {
    transform: translateY(-0.35rem);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    border-color: var(--primary-300);
  }

  .card-icon-box {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50% !important;
    margin-bottom: 1rem;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s;
  }

  .module-card:hover .card-icon-box {
    transform: scale(1.1);
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--slate-700);
    margin-bottom: 0;
    line-height: 1.2;
    transition: color 0.2s;
  }

  /* Hide description and arrow for compact look */
  .card-description,
  .card-arrow-box {
    display: none;
  }

  /* Section Separator */
  .section-separator {
    width: 100%;
    margin: 2rem 0 1.5rem 0;
    /* Reduced margins */
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .section-separator::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--slate-200), transparent);
  }

  .section-title-badge {
    position: relative;
    background: white;
    padding: 0.5rem 1.5rem;
    border-radius: 9999px;
    border: 1px solid var(--slate-200);
    color: var(--slate-500);
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Color Classes for Cards */
  .card-emerald .card-icon-box {
    background: linear-gradient(to bottom right, var(--emerald-500), var(--emerald-600));
    color: white;
  }

  .card-emerald::before {
    background: linear-gradient(to bottom right, var(--emerald-500), var(--emerald-600));
  }

  .card-blue .card-icon-box {
    background: linear-gradient(to bottom right, var(--blue-500), var(--blue-600));
    color: white;
  }

  .card-blue::before {
    background: linear-gradient(to bottom right, var(--blue-500), var(--blue-600));
  }

  .card-rose .card-icon-box {
    background: linear-gradient(to bottom right, var(--rose-500), var(--rose-600));
    color: white;
  }

  .card-rose::before {
    background: linear-gradient(to bottom right, var(--rose-500), var(--rose-600));
  }

  .card-amber .card-icon-box {
    background: linear-gradient(to bottom right, var(--amber-500), var(--amber-600));
    color: white;
  }

  .card-amber::before {
    background: linear-gradient(to bottom right, var(--amber-500), var(--amber-600));
  }

  .card-violet .card-icon-box {
    background: linear-gradient(to bottom right, var(--violet-500), var(--violet-600));
    color: white;
  }

  .card-violet::before {
    background: linear-gradient(to bottom right, var(--violet-500), var(--violet-600));
  }

  .card-indigo .card-icon-box {
    background: linear-gradient(to bottom right, #6366f1, #4f46e5);
    color: white;
  }

  .card-indigo::before {
    background: linear-gradient(to bottom right, #6366f1, #4f46e5);
  }

  .footer {
    text-align: center;
    border-top: 1px solid var(--slate-200);
    padding-top: 2rem;
    margin-top: 3rem;
  }

  .footer-text {
    font-size: 0.875rem;
    color: var(--slate-400);
  }

  /* SVG Icons */
  .icon {
    width: 1.25rem;
    height: 1.25rem;
    display: inline-block;
    vertical-align: middle;
  }

  .icon-md {
    width: 1.5rem;
    height: 1.5rem;
  }

  .icon-lg {
    width: 2rem;
    height: 2rem;
  }

  @media (min-width: 768px) {
    .main-title {
      font-size: 2.5rem;
    }

    .header-container {
      padding: 0 1.5rem;
    }

    main {
      padding: 3rem 1.5rem 5rem;
    }
  }

  @media (min-width: 1024px) {
    .header-container {
      padding: 0 2rem;
    }

    main {
      padding: 3rem 2rem 5rem;
    }
  }

    margin-bottom: 18px !important;

  }

  .btn-small {
    height: auto;
    /* Tương đương với select2--small */
    width: auto;

    padding: 5px 12px;
    font-size: 13px;
    line-height: 1.5;

  table th,
  table td {

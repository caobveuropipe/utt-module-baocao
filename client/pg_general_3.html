      if (isRoman) {
        currentRomanSection = stt;
      }
      const isMainNum = /^\d+\.$/.test(stt);
      const isTotal = String(r[1]).toLowerCase().includes('cộng') || String(r[1]).toLowerCase() === "tổng cộng";

      let isBold = false;
      if (isRoman || isTotal) {
